<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microservices Shop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    .badge {
      background: rgba(255,255,255,0.2);
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    .grid-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 768px) { .grid-top { grid-template-columns: 1fr; } }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-title span { font-size: 1rem; }

    .item-list { list-style: none; }
    .item-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 0.875rem;
      color: #374151;
    }
    .item-list li:last-child { border-bottom: none; }
    .item-list .tag {
      background: #ede9fe;
      color: #5b21b6;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .item-list .price { color: #059669; font-weight: 600; }

    /* Order form */
    .order-card { margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    label { font-size: 0.8rem; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
    select, input[type=number] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: #4f46e5; }
    .qty-wrap { min-width: 90px; }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.2s;
      height: 40px;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .toast {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
    }
    .toast.success { background: #d1fae5; color: #065f46; display: block; }
    .toast.error   { background: #fee2e2; color: #991b1b; display: block; }

    /* Orders table */
    .orders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .refresh-btn {
      background: none;
      border: 1.5px solid #e5e7eb;
      color: #555;
      padding: 5px 14px;
      font-size: 0.8rem;
      height: auto;
      border-radius: 6px;
    }
    .refresh-btn:hover { background: #f3f4f6; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      text-align: left;
      padding: 8px 12px;
      background: #f9fafb;
      color: #6b7280;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #e5e7eb;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; color: #374151; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .status {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status.completed { background: #d1fae5; color: #065f46; }
    .status.pending   { background: #fef3c7; color: #92400e; }
    .empty { text-align: center; color: #9ca3af; padding: 32px; font-size: 0.875rem; }
    .auto-badge {
      font-size: 0.7rem;
      background: #ede9fe;
      color: #5b21b6;
      padding: 2px 8px;
      border-radius: 99px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🛒 Microservices Shop</h1>
    <span class="badge">Demo</span>
  </header>

  <div class="container">
    <!-- Place Order -->
    <div class="card order-card">
      <div class="card-title"><span>🧾</span> Place an Order</div>
      <div class="form-row">
        <div>
          <label>Customer</label>
          <select id="userId"><option value="">Loading...</option></select>
        </div>
        <div>
          <label>Product</label>
          <select id="productId"><option value="">Loading...</option></select>
        </div>
        <div class="qty-wrap">
          <label>Qty</label>
          <input type="number" id="quantity" value="1" min="1" />
        </div>
        <button id="orderBtn" onclick="placeOrder()">Place Order</button>
      </div>
      <div id="toast" class="toast"></div>
    </div>

    <!-- Users & Products -->
    <div class="grid-top">
      <div class="card">
        <div class="card-title"><span>👤</span> Users</div>
        <ul id="userList" class="item-list"><li>Loading...</li></ul>
      </div>
      <div class="card">
        <div class="card-title"><span>📦</span> Products</div>
        <ul id="productList" class="item-list"><li>Loading...</li></ul>
      </div>
      <div class="card">
        <div class="card-title"><span>📊</span> Stats</div>
        <ul class="item-list">
          <li>Total Orders <span class="tag" id="statTotal">—</span></li>
          <li>Completed <span class="tag" id="statDone">—</span></li>
          <li>Pending <span class="tag" id="statPending">—</span></li>
        </ul>
      </div>
    </div>

    <!-- Orders Table -->
    <div class="card">
      <div class="orders-header">
        <div class="card-title" style="margin:0"><span>🗂️</span> Recent Orders <span class="auto-badge">auto-refresh 5s</span></div>
        <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
      </div>
      <div id="ordersWrap">
        <p class="empty">Loading orders...</p>
      </div>
    </div>
  </div>

  <script>
    const API = window.API_URL || 'http://' + location.hostname + ':30000';

    let users = [], products = [];

    async function loadAll() {
      [users, products] = await Promise.all([
        fetch(`${API}/users`).then(r => r.json()).catch(() => []),
        fetch(`${API}/products`).then(r => r.json()).catch(() => []),
      ]);

      document.getElementById('userList').innerHTML =
        users.map(u => `<li>${u.name} <span class="tag">#${u.id}</span></li>`).join('');
      document.getElementById('productList').innerHTML =
        products.map(p => `<li>${p.name} <span class="price">$${p.price}</span></li>`).join('');

      document.getElementById('userId').innerHTML =
        users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
      document.getElementById('productId').innerHTML =
        products.map(p => `<option value="${p.id}">${p.name} ($${p.price})</option>`).join('');
    }

    async function loadOrders() {
      const orders = await fetch(`${API}/orders`).then(r => r.json()).catch(() => []);

      document.getElementById('statTotal').textContent = orders.length;
      document.getElementById('statDone').textContent = orders.filter(o => o.status === 'completed').length;
      document.getElementById('statPending').textContent = orders.filter(o => o.status === 'pending').length;

      if (!orders.length) {
        document.getElementById('ordersWrap').innerHTML = '<p class="empty">No orders yet.</p>';
        return;
      }

      const userMap = Object.fromEntries(users.map(u => [u.id, u.name]));
      const prodMap = Object.fromEntries(products.map(p => [p.id, p.name]));

      document.getElementById('ordersWrap').innerHTML = `
        <table>
          <thead><tr>
            <th>Order ID</th><th>Customer</th><th>Product</th><th>Qty</th><th>Status</th><th>Time</th>
          </tr></thead>
          <tbody>
            ${orders.map(o => `<tr>
              <td><code>${o.orderId}</code></td>
              <td>${userMap[o.userId] || o.userId}</td>
              <td>${prodMap[o.productId] || o.productId}</td>
              <td>${o.quantity}</td>
              <td><span class="status ${o.status}">${o.status}</span></td>
              <td>${new Date(o.createdAt).toLocaleTimeString()}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    async function placeOrder() {
      const btn = document.getElementById('orderBtn');
      const toast = document.getElementById('toast');
      toast.className = 'toast';

      const userId = document.getElementById('userId').value;
      const productId = document.getElementById('productId').value;
      const quantity = parseInt(document.getElementById('quantity').value);

      if (!userId || !productId || quantity < 1) {
        toast.className = 'toast error';
        toast.textContent = 'Please fill in all fields.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Placing...';

      try {
        const res = await fetch(`${API}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, productId, quantity }),
        });
        const data = await res.json();
        if (data.success) {
          toast.className = 'toast success';
          toast.textContent = `✅ ${data.message} — Order ID: ${data.orderId}`;
          setTimeout(loadOrders, 1500);
        } else {
          throw new Error(data.error || 'Unknown error');
        }
      } catch (err) {
        toast.className = 'toast error';
        toast.textContent = `❌ Failed: ${err.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Place Order';
      }
    }

    loadAll().then(loadOrders);
    setInterval(loadOrders, 5000);
  </script>
</body>
</html>
